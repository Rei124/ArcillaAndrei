<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="MyDiaryDesign.css">
</head>
<body>
    <header>
        <h1 class="title-name">Gallery</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="diary.html">Diary</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

<section class="gallery">
  <div class="gallery-container">

    <!-- HEADER -->
    <h1>Gallery</h1>
    <p class="subtitle">
      A collection of moments, memories, and experiences from my college life.
    </p>

    <!-- TOP CONTROLS -->
    <div class="top-bar">
      <div class="filters">
        <button class="active">All</button>
        <button>Campus</button>
        <button>Friends</button>
        <button>Events</button>
        <button>Nature</button>
        <button>Study</button>
      </div>

      <div class="search-box">
        <input type="text" placeholder="Search photos...">
      </div>
    </div>

    <!-- GRID -->
    <div class="gallery-grid">

      <div class="item" data-category="campus">
        <img src="DiaryImages\img1.jpg">
      </div>

      <div class="item" data-category="friends">
        <img src="DiaryImages\img2.jpg">
      </div>

      <div class="item" data-category="nature">
        <img src="DiaryImages\img3.jpg">
      </div>

      <div class="item" data-category="study">
        <img src="DiaryImages\img4.jpg">
      </div>

      <div class="item" data-category="events">
        <img src="DiaryImages\img5.jpg">
      </div>

      <div class="item" data-category="nature">
        <img src="DiaryImages\img6.jpg">
      </div>

      <div class="item" data-category="study">
        <img src="DiaryImages\img7.jpg">
      </div>

      <div class="item" data-category="campus">
        <img src="DiaryImages\img8.jpg">
      </div>

    </div>

    <!-- BUTTON -->
    <div class="load-more">
      <button>View More Photos ⌄</button>
    </div>

  </div>
</section>
</body>
</html>
